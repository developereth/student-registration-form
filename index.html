<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }
        .header {
            background: #2d3748;
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .form-section {
            padding: 32px;
        }
        .hidden {
            display: none;
        }
        h2 {
            color: #2d3748;
            margin-bottom: 24px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #5a67d8;
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>College Admin Office</h1>
            <p>Officer Registration Portal</p>
        </div>

        <div class="form-section">
            <!-- Password Gate -->
            <div id="passwordGate">
                <h2>Enter Access Password</h2>
                <div class="form-group">
                    <input type="password" id="accessPassword" placeholder="Enter password" autocomplete="off">
                </div>
                <button onclick="verifyPassword()">Access Form</button>
                <div id="passwordMessage" class="message"></div>
            </div>

            <!-- Registration Form -->
            <div id="registrationForm" class="hidden">
                <h2>Officer Registration</h2>
                <form id="officerForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" id="email" required placeholder="john@college.edu">
                    </div>
                    <div class="form-group">
                        <label>Officer ID *</label>
                        <input type="text" id="officerId" required placeholder="OFF-12345">
                    </div>
                    <div class="form-group">
                        <label>Department *</label>
                        <select id="department" required>
                            <option value="">Select Department</option>
                            <option value="Admissions">Admissions</option>
                            <option value="Registrar">Registrar</option>
                            <option value="Finance">Finance</option>
                            <option value="Student Affairs">Student Affairs</option>
                            <option value="Academic Affairs">Academic Affairs</option>
                            <option value="IT Services">IT Services</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="+1234567890">
                    </div>
                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="notes" rows="3" placeholder="Any additional information..."></textarea>
                    </div>
                    <button type="submit">Submit Registration</button>
                </form>
                <div id="formMessage" class="message"></div>
                <span class="back-link" onclick="showPasswordGate()">← Back to password</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://officer-registration.developeraddis.workers.dev/api';

        // Check if already authenticated (session storage)
        if (sessionStorage.getItem('authenticated') === 'true') {
            showRegistrationForm();
        }

        async function verifyPassword() {
            const password = document.getElementById('accessPassword').value;
            const messageDiv = document.getElementById('passwordMessage');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            if (!password) {
                showMessage('passwordMessage', 'Please enter a password', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem('authenticated', 'true');
                    showRegistrationForm();
                } else {
                    showMessage('passwordMessage', 'Incorrect password', 'error');
                }
            } catch (error) {
                showMessage('passwordMessage', 'Connection error. Please try again.', 'error');
            }
        }

        function showRegistrationForm() {
            document.getElementById('passwordGate').classList.add('hidden');
            document.getElementById('registrationForm').classList.remove('hidden');
            document.getElementById('accessPassword').value = '';
        }

        function showPasswordGate() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('registrationForm').classList.add('hidden');
            document.getElementById('passwordGate').classList.remove('hidden');
        }

        function showMessage(elementId, text, type) {
            const div = document.getElementById(elementId);
            div.textContent = text;
            div.className = `message ${type}`;
            setTimeout(() => {
                div.style.display = 'none';
            }, 5000);
        }

        document.getElementById('officerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                officerId: document.getElementById('officerId').value,
                department: document.getElementById('department').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value,
                submittedAt: new Date().toISOString()
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('formMessage', 'Registration submitted successfully!', 'success');
                    document.getElementById('officerForm').reset();
                } else if (result.duplicate) {
                    showMessage('formMessage', 'This Officer ID or Email is already registered.', 'error');
                } else {
                    showMessage('formMessage', result.error || 'Submission failed. Please try again.', 'error');
                }
            } catch (error) {
                showMessage('formMessage', 'Connection error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Registration';
            }
        });

        // Allow Enter key to submit password
        document.getElementById('accessPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
</body>
</html>
