<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty College Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 520px;
            overflow: hidden;
        }
        .header {
            background: #2d3748;
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .form-section { padding: 28px; }
        .hidden { display: none; }
        h2 { color: #2d3748; margin-bottom: 20px; font-size: 18px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; color: #4a5568; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #e91e63; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        button {
            width: 100%;
            padding: 12px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover { background: #c2185b; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .message {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            text-align: center;
        }
        .message.success { background: #c6f6d5; color: #22543d; display: block; }
        .message.error { background: #fed7d7; color: #742a2a; display: block; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #e91e63;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }
        .payment-hint { font-size: 11px; color: #a0aec0; margin-top: 2px; }
        .pic-upload {
            border: 2px dashed #e2e8f0;
            padding: 16px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .pic-upload:hover { border-color: #e91e63; }
        .pic-upload img {
            max-width: 100%;
            max-height: 150px;
            margin-top: 8px;
            border-radius: 8px;
            display: none;
        }
        .pic-upload small { color: #a0aec0; display: block; }
        .pic-upload .selected-text { color: #48bb78; font-weight: bold; display: none; }
        @media (max-width: 400px) {
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Beauty College</h1>
            <p>Student Registration Portal</p>
        </div>

        <div class="form-section">
            <!-- Password Gate -->
            <div id="passwordGate">
                <h2>Enter Access Password</h2>
                <div class="form-group">
                    <input type="password" id="accessPassword" placeholder="Enter password" autocomplete="off">
                </div>
                <button onclick="verifyPassword()">Access Form</button>
                <div id="passwordMessage" class="message"></div>
            </div>

            <!-- Registration Form -->
            <div id="registrationForm" class="hidden">
                <h2>Student Registration</h2>
                <form id="registrationFormElem">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" required placeholder="Enter full name">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" required placeholder="+251...">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="email@example.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Select Course *</label>
                        <select id="course" required>
                            <option value="">Choose a course...</option>
                            <option value="Hairdressing & Barbering">1. Hairdressing & Barbering</option>
                            <option value="Makeup Artistry">2. Makeup Artistry</option>
                            <option value="Nail Technology">3. Nail Technology</option>
                            <option value="Skincare & Aesthetics">4. Skincare & Aesthetics</option>
                            <option value="Eyelash & Brow Services">5. Eyelash & Brow Services</option>
                            <option value="Massage Therapy">6. Massage Therapy</option>
                            <option value="Henna Art">7. Henna Art</option>
                            <option value="Bridal & Fashion Makeup">8. Bridal & Fashion Makeup</option>
                            <option value="Facial Treatment">9. Facial Treatment</option>
                            <option value="Beauty Therapy & Salon Management">10. Beauty Therapy & Salon Management</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact Phone *</label>
                        <input type="tel" id="emergencyPhone" required placeholder="+251...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Registration Date</label>
                            <input type="date" id="regDate">
                        </div>
                        <div class="form-group">
                            <label>Payment Amount</label>
                            <input type="text" id="paymentAmount" placeholder="$1000">
                            <span class="payment-hint">Enter amount in dollars</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="payment">
                            <option value="">Select payment status</option>
                            <option value="Pending">Pending</option>
                            <option value="Partial">Partial Payment</option>
                            <option value="Paid">Fully Paid</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Student Photo</label>
                        <div class="pic-upload" id="picUploadBox" onclick="document.getElementById('studentPic').click()">
                            <small id="picLabel">📷 Tap to select student photo</small>
                            <small class="selected-text" id="picSelected">✅ Photo selected</small>
                            <img id="picPreview">
                        </div>
                        <input type="file" id="studentPic" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)">
                    </div>

                    <button type="submit" id="submitBtn">Submit Registration</button>
                </form>
                <div id="formMessage" class="message"></div>
                <span class="back-link" onclick="showPasswordGate()">← Back to password</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://officer-registration.developeraddis.workers.dev/api';
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dssurphvs/image/upload';
        const CLOUDINARY_PRESET = 'student-photos';

        let selectedPhotoFile = null;

        if (sessionStorage.getItem('authenticated') === 'true') {
            showRegistrationForm();
        }

        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedPhotoFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('picPreview').src = e.target.result;
                    document.getElementById('picPreview').style.display = 'block';
                    document.getElementById('picLabel').style.display = 'none';
                    document.getElementById('picSelected').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function uploadPhoto(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);

            try {
                const response = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.secure_url) {
                    return result.secure_url;
                }
                return '';
            } catch (e) {
                return '';
            }
        }

        async function verifyPassword() {
            const password = document.getElementById('accessPassword').value;
            const messageDiv = document.getElementById('passwordMessage');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            if (!password) {
                showMessage('passwordMessage', 'Please enter a password', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const result = await response.json();
                if (result.success) {
                    sessionStorage.setItem('authenticated', 'true');
                    showRegistrationForm();
                } else {
                    showMessage('passwordMessage', 'Incorrect password', 'error');
                }
            } catch (error) {
                showMessage('passwordMessage', 'Connection error. Please try again.', 'error');
            }
        }

        function showRegistrationForm() {
            document.getElementById('passwordGate').classList.add('hidden');
            document.getElementById('registrationForm').classList.remove('hidden');
            document.getElementById('accessPassword').value = '';
        }

        function showPasswordGate() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('registrationForm').classList.add('hidden');
            document.getElementById('passwordGate').classList.remove('hidden');
        }

        function showMessage(elementId, text, type) {
            const div = document.getElementById(elementId);
            div.textContent = text;
            div.className = `message ${type}`;
            setTimeout(() => { div.style.display = 'none'; }, 5000);
        }

        document.getElementById('registrationFormElem').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading photo...';

            // Upload photo first if selected
            let photoUrl = '';
            if (selectedPhotoFile) {
                submitBtn.textContent = 'Uploading photo...';
                photoUrl = await uploadPhoto(selectedPhotoFile);
            }

            submitBtn.textContent = 'Saving...';

            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                course: document.getElementById('course').value,
                emergencyPhone: document.getElementById('emergencyPhone').value.trim(),
                regDate: document.getElementById('regDate').value,
                paymentAmount: document.getElementById('paymentAmount').value.trim(),
                payment: document.getElementById('payment').value,
                photoUrl: photoUrl,
                submittedAt: new Date().toISOString()
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('formMessage', 'Registration submitted successfully!', 'success');
                    document.getElementById('registrationFormElem').reset();
                    document.getElementById('picPreview').style.display = 'none';
                    document.getElementById('picLabel').style.display = 'block';
                    document.getElementById('picSelected').style.display = 'none';
                    selectedPhotoFile = null;
                } else if (result.duplicate) {
                    showMessage('formMessage', 'This phone number is already registered.', 'error');
                } else {
                    showMessage('formMessage', result.error || 'Submission failed.', 'error');
                }
            } catch (error) {
                showMessage('formMessage', 'Connection error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Registration';
            }
        });

        document.getElementById('accessPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
</body>
</html>
