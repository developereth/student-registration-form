<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Registrations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f7fafc;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #2d3748;
            font-size: 24px;
        }
        .header span {
            color: #718096;
            font-size: 14px;
        }
        .gate {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            margin: 100px auto;
        }
        .gate input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .gate button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
        }
        th {
            background: #2d3748;
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #4a5568;
        }
        tr:hover td {
            background: #f7fafc;
        }
        .hidden {
            display: none;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        .refresh-btn {
            padding: 10px 20px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn {
            padding: 10px 20px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: #a0aec0;
            font-size: 18px;
        }
        .export-btn {
            padding: 10px 20px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Admin Login Gate -->
        <div id="adminGate" class="gate">
            <h2 style="margin-bottom: 20px; color: #2d3748;">Admin Access</h2>
            <p style="margin-bottom: 20px; color: #718096; font-size: 14px;">Enter admin PIN to view registrations</p>
            <input type="password" id="adminPin" placeholder="Admin PIN" autocomplete="off">
            <button onclick="verifyAdmin()">Access Admin Panel</button>
            <div id="gateMessage" class="message"></div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="hidden">
            <div class="header">
                <div>
                    <h1>Officer Registrations</h1>
                    <span id="recordCount">Loading...</span>
                </div>
                <div>
                    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
                    <button class="refresh-btn" onclick="loadRegistrations()">Refresh</button>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            <table id="registrationsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Officer ID</th>
                        <th>Department</th>
                        <th>Phone</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="noData" class="no-data hidden">No registrations yet.</div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const ADMIN_SESSION_KEY = 'admin_authenticated';
        const ADMIN_PIN_KEY = 'admin_pin';

        // Check if already authenticated
        if (sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true') {
            showDashboard();
            loadRegistrations();
        }

        async function verifyAdmin() {
            const pin = document.getElementById('adminPin').value;
            const messageDiv = document.getElementById('gateMessage');

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            if (!pin) {
                showGateMessage('Please enter admin PIN', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });

                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem(ADMIN_SESSION_KEY, 'true');
                    sessionStorage.setItem(ADMIN_PIN_KEY, pin);
                    showDashboard();
                    loadRegistrations();
                } else {
                    showGateMessage('Incorrect PIN', 'error');
                }
            } catch (error) {
                showGateMessage('Connection error. Please try again.', 'error');
            }
        }

        function showGateMessage(text, type) {
            const div = document.getElementById('gateMessage');
            div.textContent = text;
            div.className = `message ${type}`;
        }

        function showDashboard() {
            document.getElementById('adminGate').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
        }

        function logout() {
            sessionStorage.removeItem(ADMIN_SESSION_KEY);
            sessionStorage.removeItem(ADMIN_PIN_KEY);
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminGate').classList.remove('hidden');
            document.getElementById('adminPin').value = '';
        }

        async function loadRegistrations() {
            const pin = sessionStorage.getItem(ADMIN_PIN_KEY);
            const tableBody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');
            const recordCount = document.getElementById('recordCount');

            try {
                const response = await fetch(`${API_URL}/admin/registrations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });

                const result = await response.json();

                if (result.success) {
                    const registrations = result.data || [];
                    recordCount.textContent = `${registrations.length} registration(s)`;

                    if (registrations.length === 0) {
                        tableBody.innerHTML = '';
                        noData.classList.remove('hidden');
                    } else {
                        noData.classList.add('hidden');
                        tableBody.innerHTML = registrations.map(reg => `
                            <tr>
                                <td>${new Date(reg.submittedAt).toLocaleString()}</td>
                                <td><strong>${escapeHtml(reg.fullName)}</strong></td>
                                <td>${escapeHtml(reg.email)}</td>
                                <td>${escapeHtml(reg.officerId)}</td>
                                <td>${escapeHtml(reg.department)}</td>
                                <td>${escapeHtml(reg.phone || '-')}</td>
                                <td>${escapeHtml(reg.notes || '-')}</td>
                            </tr>
                        `).join('');
                    }
                } else {
                    logout();
                    alert('Session expired. Please login again.');
                }
            } catch (error) {
                recordCount.textContent = 'Error loading data';
            }
        }

        function exportCSV() {
            const table = document.getElementById('registrationsTable');
            const rows = Array.from(table.querySelectorAll('tr'));
            
            let csv = [];
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('th, td'));
                const rowData = cols.map(col => `"${col.textContent.replace(/"/g, '""')}"`).join(',');
                csv.push(rowData);
            });

            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `registrations-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key on PIN input
        document.getElementById('adminPin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAdmin();
        });
    </script>
</body>
</html>
